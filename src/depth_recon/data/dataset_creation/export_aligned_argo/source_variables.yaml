# Source variable names used by raw NetCDF source helpers.
# Comments document expected source meanings/units from representative NetCDF
# metadata.

argo:
  # Corrected profile sample depth; units: metre.
  depth_var: DEPH_CORRECTED
  profile_vars:
    # In-situ temperature on the t90 scale; units: degree_celsius.
    - TEMP
    # Corrected potential temperature; units: degree_celsius.
    - POTM_CORRECTED
    # Corrected practical salinity; units: 1 (unitless practical salinity).
    - PSAL_CORRECTED
  level_qc_vars:
    # Optional depth-level QC for corrected depth; units: none, encoded QC code.
    depth: DEPH_CORRECTED_QC
    # Optional depth-level QC for in-situ temperature; units: none, encoded QC code.
    temp: TEMP_QC
    # Optional depth-level QC for corrected potential temperature; units: none, encoded QC code.
    potm: POTM_CORRECTED_QC
    # Optional depth-level QC for corrected practical salinity; units: none, encoded QC code.
    psal: PSAL_CORRECTED_QC
  profile_qc_vars:
    # Optional profile date/time QC; units: none, encoded QC code.
    juld: JULD_QC
    # Optional profile position QC; units: none, encoded QC code.
    position: POSITION_QC
    # Optional whole-profile depth QC; units: none, encoded QC code.
    profile_depth: PROFILE_DEPH_QC
    # Optional whole-profile potential-temperature QC; units: none, encoded QC code.
    profile_potm: PROFILE_POTM_QC
    # Optional whole-profile practical-salinity QC; units: none, encoded QC code.
    profile_psal: PROFILE_PSAL_QC

glorys:
  vars_3d:
    # Sea-water potential temperature on depth levels; units: degrees_C.
    - thetao
    # Sea-water salinity on depth levels; source units: 1e-3 / PSU.
    - so
    # Eastward sea-water velocity on depth levels; units: m s-1.
    - uo
    # Northward sea-water velocity on depth levels; units: m s-1.
    - vo
  vars_2d:
    # Sea surface height above geoid; units: m.
    - zos
    # Density ocean mixed layer thickness; units: m.
    - mlotst
    # Sea floor potential temperature; units: degrees_C.
    - bottomT
    # Sea ice thickness; units: m.
    - sithick
    # Sea ice area fraction; units: 1.
    - siconc
    # Eastward sea-ice velocity; units: m s-1.
    - usi
    # Northward sea-ice velocity; units: m s-1.
    - vsi

ostia:
  vars:
    # Sea-surface foundation temperature; units: kelvin.
    - analysed_sst
    # Sea-surface foundation temperature standard error; units: kelvin.
    - analysis_error
    # Sea ice area fraction; units: 1.
    - sea_ice_fraction
    # OSTIA categorical land/sea/ice mask; units: none, encoded category.
    - mask

sealevel:
  vars:
    # Sea level anomaly; units: m.
    - sla
    # Formal mapping error for sea level anomaly; units: m.
    - err_sla
    # Zonal/eastward geostrophic velocity anomaly; units: m/s.
    - ugosa
    # Formal mapping error for zonal velocity anomaly; units: m/s.
    - err_ugosa
    # Meridional/northward geostrophic velocity anomaly; units: m/s.
    - vgosa
    # Formal mapping error for meridional velocity anomaly; units: m/s.
    - err_vgosa
    # Absolute dynamic topography; units: m.
    - adt
    # Absolute zonal/eastward geostrophic velocity; units: m/s.
    - ugos
    # Absolute meridional/northward geostrophic velocity; units: m/s.
    - vgos
    # Ice status flag using the source 15% ice-concentration criterion; units: none.
    - flag_ice
    # TOPEX-A instrumental drift correction; units: m.
    - tpa_correction

sss:
  vars:
    # Analysed sea-surface salinity; source units: 0.001 / practical salinity unit.
    - sos
    # Analysed sea-surface density; units: kg/m3.
    - dos
    # Sea ice fraction; source metadata reports percent, source values are 0..1.
    - sea_ice_fraction
